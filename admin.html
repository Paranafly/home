<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin ParanaFly - Gestor de Contenido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        /* TABS */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: white;
            border-color: #667eea;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .tab-btn:hover {
            background: white;
            border-color: #667eea;
        }

        /* MAIN CONTENT */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            border-left: 4px solid #667eea;
        }

        /* FORM */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 40px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #667eea;
        }

        .file-input-label:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .file-input-label.dragover {
            background: #e8e8ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        /* PREVIEW */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preview-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .preview-item:hover .preview-item-remove {
            opacity: 1;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 24px;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        /* SECTIONS LIST */
        .sections-list {
            display: grid;
            gap: 15px;
        }

        .section-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .section-item:hover {
            background: #f0f0f0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .section-item-info h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .section-item-info p {
            font-size: 13px;
            color: #999;
        }

        .section-item-count {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }

        /* STATUS */
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* LOADER */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .tabs-container {
                justify-content: center;
            }

            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🎣 Admin ParanaFly</h1>
            <div class="header-buttons">
                <button class="btn btn-secondary" onclick="openGithubModal()">⚙️ Conectar GitHub</button>
                <button class="btn btn-primary" onclick="exportData()">📥 Exportar Datos</button>
                <button class="btn btn-secondary" onclick="importData()">📤 Importar Datos</button>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('hero')">🏠 Hero</button>
            <button class="tab-btn" onclick="switchTab('nosotros')">👥 Nosotros</button>
            <button class="tab-btn" onclick="switchTab('servicios')">💼 Servicios</button>
            <button class="tab-btn" onclick="switchTab('programas')">📚 Programas</button>
            <button class="tab-btn" onclick="switchTab('imagenes')">📸 Galería</button>
            <button class="tab-btn" onclick="switchTab('contacto')">📧 Contacto</button>
        </div>

        <!-- CONTENIDO -->
        <div id="tabContent"></div>
    </div>

    <!-- MODAL GITHUB -->
    <div id="githubModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Conectar con GitHub</h2>
                <button class="modal-close" onclick="closeModal('githubModal')">×</button>
            </div>
            <div class="form-group">
                <label>Token de GitHub (Personal Access Token)</label>
                <input type="password" id="githubToken" placeholder="ghp_...">
                <p style="font-size: 12px; color: #999; margin-top: 10px;">
                    📖 <a href="https://github.com/settings/tokens" target="_blank">Crear token aquí</a>
                </p>
            </div>
            <div class="form-group">
                <label>Usuario de GitHub</label>
                <input type="text" id="githubUser" placeholder="tu-usuario">
            </div>
            <div class="form-group">
                <label>Repositorio</label>
                <input type="text" id="githubRepo" placeholder="parana-fly">
            </div>
            <div class="form-group">
                <label>Rama (branch)</label>
                <input type="text" id="githubBranch" value="main" placeholder="main">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="connectGithub()">Conectar</button>
                <button class="btn btn-secondary" onclick="closeModal('githubModal')">Cancelar</button>
            </div>
            <div id="githubStatus" style="margin-top: 20px;"></div>
        </div>
    </div>

    <!-- MODAL DE PREVIEW GRANDE -->
    <div id="previewModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Vista Previa</h2>
                <button class="modal-close" onclick="closeModal('previewModal')">×</button>
            </div>
            <img id="previewImage" src="" style="width: 100%; border-radius: 8px;">
        </div>
    </div>

    <script>
        // ============ DATA MANAGEMENT ============
        const STORAGE_KEY = 'paranafly_admin_data';
        let allSections = {
            hero: { title: 'Sección Hero', images: [] },
            nosotros: { title: 'Nosotros', images: [] },
            servicios: { title: 'Servicios', images: [] },
            programas: { title: 'Programas', images: [] },
            imagenes: { title: 'Galería', images: [] },
            contacto: { title: 'Contacto', images: [] }
        };

        let githubConfig = {
            token: '',
            user: '',
            repo: '',
            branch: 'main'
        };

        // Cargar datos al iniciar
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                allSections = JSON.parse(saved);
            }

            const githubSaved = localStorage.getItem('github_config');
            if (githubSaved) {
                githubConfig = JSON.parse(githubSaved);
            }

            switchTab('hero');
        }

        // Guardar datos
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allSections));
            showStatus('success', '✓ Datos guardados localmente');
        }

        // ============ UI FUNCTIONS ============
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderTab(tab);
        }

        function renderTab(tab) {
            const section = allSections[tab];
            let html = `
                <div class="content">
                    <div class="card">
                        <h2>📤 Cargar Imágenes - ${section.title}</h2>
                        <div class="card-info">
                            ${section.images.length} imagen(es) cargada(s) en esta sección
                        </div>

                        <div class="form-group">
                            <label>🔗 Agregar imagen por URL</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="imageUrl-${tab}" placeholder="https://ejemplo.com/imagen.jpg" style="flex: 1;">
                                <button class="btn btn-primary" onclick="addImageFromUrl('${tab}')">+ Agregar URL</button>
                            </div>
                            <p style="font-size: 12px; color: #999; margin-top: 8px;">Soporta: JPG, PNG, WebP, GIF. Máximo 5MB</p>
                        </div>

                        <div class="form-group">
                            <label>📁 O arrastra imágenes aquí</label>
                            <div class="file-input-wrapper" id="dropZone-${tab}">
                                <label class="file-input-label" id="dropLabel-${tab}">
                                    <span>📁 Selecciona imágenes locales</span>
                                </label>
                                <input type="file" id="fileInput-${tab}" multiple accept="image/*" onchange="handleFileSelect(event, '${tab}')">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Vista Previa (${section.images.length} imágenes)</label>
                            <div class="preview-grid" id="preview-${tab}">
            `;

            section.images.forEach((img, idx) => {
                html += `
                    <div class="preview-item" onclick="openPreview('${img}')">
                        <img src="${img}" alt="Imagen ${idx + 1}">
                        <button class="preview-item-remove" onclick="removeImage('${tab}', ${idx}); event.stopPropagation();">×</button>
                    </div>
                `;
            });

            html += `
                            </div>
                        </div>

                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="btn btn-success" onclick="syncToGithub('${tab}')" style="flex: 1; min-width: 180px;">📤 Sincronizar GitHub</button>
                            <button class="btn btn-primary" onclick="saveLocalData('${tab}')" style="flex: 1; min-width: 180px;">💾 Guardar Localmente</button>
                            <button class="btn btn-danger" onclick="clearSection('${tab}')" style="flex: 1; min-width: 180px;">🗑️ Limpiar</button>
                        </div>
                    </div>

                    <div class="card">
                        <h2>ℹ️ Información</h2>
                        <div class="card-info">
                            <strong>Sección:</strong> ${section.title}<br>
                            <strong>Imágenes:</strong> ${section.images.length}<br>
                            <strong>Almacenamiento:</strong> Local Storage
                        </div>

                        <h3 style="margin: 20px 0 15px 0; font-size: 16px;">🎯 Guía de Uso</h3>
                        <ol style="padding-left: 20px; line-height: 2; color: #666; font-size: 13px;">
                            <li><strong>Carga imágenes</strong> - Arrastra o haz click en el área</li>
                            <li><strong>Guardar localmente</strong> - Click en "💾 Guardar Localmente" (automático en tu navegador)</li>
                            <li><strong>Verificar cambios</strong> - Recarga tu página index.html para ver los cambios</li>
                            <li><strong>(Opcional) Sincronizar GitHub</strong> - Conecta GitHub primero, luego usa "📤 Sincronizar GitHub"</li>
                            <li><strong>Eliminar imagen</strong> - Click en la "X" roja de la miniatura</li>
                        </ol>

                        <h3 style="margin: 25px 0 15px 0; font-size: 16px;">Formatos Recomendados</h3>
                        <ul style="padding-left: 20px; line-height: 1.8; color: #666; font-size: 14px;">
                            <li>📷 JPG - Fotos y imágenes complejas</li>
                            <li>🎨 PNG - Imágenes con transparencia</li>
                            <li>⚡ WebP - Máxima compresión</li>
                            <li>📊 Tamaño máximo: 5MB por imagen</li>
                        </ul>

                        <div class="card-info" style="margin-top: 25px;">
                            <strong>⚠️ Nota:</strong> Los cambios se guardan automáticamente en tu navegador. Sincroniza con GitHub para actualizar tu sitio público.
                        </div>
                    </div>
                </div>

                <div id="status-${tab}"></div>
            `;

            document.getElementById('tabContent').innerHTML = html;

            // Configurar drag & drop
            setupDragDrop(tab);
        }

        function setupDragDrop(tab) {
            const dropZone = document.getElementById(`dropZone-${tab}`);
            const fileInput = document.getElementById(`fileInput-${tab}`);
            const label = document.getElementById(`dropLabel-${tab}`);

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
                dropZone.addEventListener(event, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(event => {
                dropZone.addEventListener(event, () => {
                    label.classList.add('dragover');
                });
            });

            ['dragleave', 'drop'].forEach(event => {
                dropZone.addEventListener(event, () => {
                    label.classList.remove('dragover');
                });
            });

            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                fileInput.files = files;
                handleFileSelect({ target: { files } }, tab);
            });

            label.addEventListener('click', () => fileInput.click());
        }

        function handleFileSelect(event, tab) {
            const files = event.target.files;
            let loaded = 0;

            Array.from(files).forEach((file, idx) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        allSections[tab].images.push(e.target.result);
                        loaded++;

                        if (loaded === files.length) {
                            saveData();
                            renderTab(tab);
                            showSyncModal('success', '✅ Cargado', `✓ ${files.length} imagen(es) agregada(s)`);
                            setTimeout(() => closeSyncModal(), 2500);
                        }
                    };
                    reader.readAsDataURL(file);
                } else {
                    showSyncModal('error', 'Error', '❌ Solo se aceptan imágenes');
                }
            });
        }

        function addImageFromUrl(tab) {
            const urlInput = document.getElementById(`imageUrl-${tab}`);
            const url = urlInput.value.trim();

            if (!url) {
                showSyncModal('error', 'Sin URL', '❌ Por favor ingresa una URL');
                return;
            }

            // Validar que sea URL válida
            try {
                new URL(url);
            } catch (e) {
                showSyncModal('error', 'URL inválida', '❌ La URL no es válida');
                return;
            }

            showSyncModal('loading', 'Cargando...', '⏳ Descargando imagen desde URL...');

            // Cargar imagen desde URL
            const img = new Image();
            img.crossOrigin = "Anonymous";
            
            img.onload = () => {
                // Convertir a canvas y luego a base64
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // Comprimir si es muy grande
                let quality = 0.85;
                let base64 = canvas.toDataURL('image/jpeg', quality);

                // Si la imagen es muy grande, reducir calidad
                while (base64.length > 5 * 1024 * 1024 && quality > 0.5) {
                    quality -= 0.1;
                    base64 = canvas.toDataURL('image/jpeg', quality);
                }

                if (base64.length > 5 * 1024 * 1024) {
                    showSyncModal('error', 'Archivo muy grande', '❌ La imagen es muy grande (máximo 5MB)');
                    return;
                }

                allSections[tab].images.push(base64);
                saveData();
                renderTab(tab);
                
                // Limpiar input
                urlInput.value = '';
                
                showSyncModal('success', '✅ ¡Cargada!', '✓ Imagen agregada correctamente desde URL');
                setTimeout(() => closeSyncModal(), 2500);
            };

            img.onerror = () => {
                showSyncModal('error', 'Error al cargar', `❌ No se pudo descargar la imagen.\n\nVerifica que:\n• La URL sea correcta\n• La imagen sea accesible\n• No tenga restricciones CORS`);
            };

            img.src = url;
        }

        function removeImage(tab, idx) {
            if (confirm('¿Eliminar esta imagen?')) {
                allSections[tab].images.splice(idx, 1);
                saveData();
                renderTab(tab);
            }
        }

        function clearSection(tab) {
            if (confirm(`¿Limpiar todas las imágenes de ${allSections[tab].title}?`)) {
                allSections[tab].images = [];
                saveData();
                renderTab(tab);
                showSyncModal('success', '✅ Limpiado', '✓ Sección limpiada correctamente');
                setTimeout(() => closeSyncModal(), 2000);
            }
        }

        function saveLocalData(tab) {
            const images = allSections[tab].images;
            if (images.length === 0) {
                showSyncModal('error', 'Sin imágenes', '❌ No hay imágenes para guardar');
                return;
            }

            saveData();
            showSyncModal('success', '✅ ¡Guardado!', `✓ ${images.length} imagen(es) guardada(s) en tu navegador\n\n(Los cambios se actualizan automáticamente en tu página)`);
            setTimeout(() => closeSyncModal(), 3000);
        }

        function openPreview(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('previewModal').classList.add('active');
        }

        // ============ GITHUB INTEGRATION ============
        function openGithubModal() {
            document.getElementById('githubModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function connectGithub() {
            const token = document.getElementById('githubToken').value;
            const user = document.getElementById('githubUser').value;
            const repo = document.getElementById('githubRepo').value;
            const branch = document.getElementById('githubBranch').value;

            if (!token || !user || !repo) {
                showGithubStatus('error', '❌ Completa todos los campos');
                return;
            }

            githubConfig = { token, user, repo, branch };
            localStorage.setItem('github_config', JSON.stringify(githubConfig));

            showGithubStatus('success', '✓ GitHub conectado correctamente');
            setTimeout(() => closeModal('githubModal'), 2000);
        }

        function syncToGithub(tab) {
            if (!githubConfig.token) {
                showSyncModal('error', 'GitHub no conectado', 'Por favor conecta GitHub primero');
                setTimeout(() => openGithubModal(), 1500);
                return;
            }

            const images = allSections[tab].images;
            if (images.length === 0) {
                showSyncModal('error', 'Sin imágenes', '❌ No hay imágenes para sincronizar en esta sección');
                return;
            }

            showSyncModal('loading', 'Sincronizando...', `⏳ Subiendo ${images.length} imagen(es) a GitHub...`);

            // Crear archivo JSON con las imágenes en base64
            const data = {
                section: tab,
                title: allSections[tab].title,
                images: images,
                timestamp: new Date().toISOString(),
                count: images.length
            };

            uploadToGithub(tab, data);
        }

        async function uploadToGithub(tab, data) {
            try {
                const { token, user, repo, branch } = githubConfig;
                const filename = `data/${tab}-images.json`;
                const content = btoa(JSON.stringify(data, null, 2)); // Base64 encode
                const url = `https://api.github.com/repos/${user}/${repo}/contents/${filename}`;

                // Intentar obtener el SHA del archivo existente
                let sha = null;
                try {
                    const getResponse = await fetch(url, {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (getResponse.ok) {
                        const fileData = await getResponse.json();
                        sha = fileData.sha;
                    }
                } catch (e) {
                    // El archivo no existe, eso es normal
                }

                // Subir/actualizar el archivo
                const message = sha ? `Actualizar imágenes de ${tab}` : `Crear imágenes de ${tab}`;
                const putBody = {
                    message,
                    content,
                    branch
                };
                
                if (sha) {
                    putBody.sha = sha;
                }

                const putResponse = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(putBody)
                });

                if (!putResponse.ok) {
                    const errorData = await putResponse.json();
                    throw new Error(errorData.message || 'Error en GitHub API');
                }

                const response = await putResponse.json();
                
                if (response.content) {
                    showSyncModal('success', '✅ ¡Sincronizado!', `✓ ${data.count} imagen(es) subida(s) a GitHub exitosamente`);
                    setTimeout(() => closeSyncModal(), 3000);
                } else {
                    throw new Error('Respuesta inesperada de GitHub');
                }
            } catch (err) {
                console.error('Error en sincronización:', err);
                
                let errorMsg = err.message;
                if (err.message.includes('401')) {
                    errorMsg = 'Token inválido o expirado. Reconecta GitHub.';
                } else if (err.message.includes('404')) {
                    errorMsg = 'Repositorio no encontrado. Verifica usuario y repo.';
                } else if (err.message.includes('403')) {
                    errorMsg = 'Permiso denegado. Verifica los permisos del token.';
                }
                
                showSyncModal('error', 'Error al sincronizar', `❌ ${errorMsg}`);
            }
        }

        // Modal de sincronización mejorado
        function showSyncModal(type, title, message) {
            let icon = '⏳';
            let bgColor = '#d1ecf1';
            let textColor = '#0c5460';
            let borderColor = '#bee5eb';

            if (type === 'success') {
                icon = '✅';
                bgColor = '#d4edda';
                textColor = '#155724';
                borderColor = '#c3e6cb';
            } else if (type === 'error') {
                icon = '❌';
                bgColor = '#f8d7da';
                textColor = '#721c24';
                borderColor = '#f5c6cb';
            }

            const syncDiv = document.getElementById('syncModal') || createSyncModal();
            
            let contentHtml = `
                <div style="background: ${bgColor}; border: 2px solid ${borderColor}; border-radius: 8px; padding: 40px 30px; text-align: center; color: ${textColor};">
                    <div style="font-size: 60px; margin-bottom: 20px; line-height: 1;">
                        ${type === 'loading' ? `
                            <style>
                                .big-loader {
                                    display: inline-block;
                                    width: 60px;
                                    height: 60px;
                                    border: 4px solid ${bgColor};
                                    border-top: 4px solid #667eea;
                                    border-radius: 50%;
                                    animation: bigSpin 1s linear infinite;
                                }
                                @keyframes bigSpin {
                                    0% { transform: rotate(0deg); }
                                    100% { transform: rotate(360deg); }
                                }
                            </style>
                            <div class="big-loader"></div>
                        ` : icon}
                    </div>
                    <h3 style="font-size: 24px; font-weight: 700; margin: 15px 0 10px 0; color: ${textColor};">${title}</h3>
                    <p style="font-size: 15px; margin: 0; line-height: 1.6; color: ${textColor};">${message}</p>
                </div>
            `;
            
            syncDiv.innerHTML = contentHtml;
            syncDiv.style.display = 'flex';
        }

        function closeSyncModal() {
            const syncDiv = document.getElementById('syncModal');
            if (syncDiv) {
                syncDiv.style.display = 'none';
            }
        }

        function createSyncModal() {
            const div = document.createElement('div');
            div.id = 'syncModal';
            div.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                padding: 0;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.4);
                z-index: 10000;
                min-width: 420px;
                max-width: 550px;
                display: none;
                align-items: center;
                justify-content: center;
                animation: slideIn 0.3s ease-out;
            `;
            
            // Agregar animación
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from {
                        opacity: 0;
                        transform: translate(-50%, -50%) scale(0.9);
                    }
                    to {
                        opacity: 1;
                        transform: translate(-50%, -50%) scale(1);
                    }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(div);
            return div;
        }

        // ============ UTILIDADES ============
        function exportData() {
            const data = {
                sections: allSections,
                timestamp: new Date().toISOString()
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `paranafly-backup-${Date.now()}.json`;
            a.click();

            showStatus('success', '✓ Datos exportados');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        allSections = data.sections;
                        saveData();
                        loadData();
                        showStatus('success', '✓ Datos importados correctamente');
                    } catch (err) {
                        showStatus('error', '❌ Error al importar: Archivo inválido');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function showStatus(type, message) {
            const statusDiv = document.getElementById(`status-${getCurrentTab()}`);
            if (statusDiv) {
                statusDiv.innerHTML = `<div class="status ${type} show">${message}</div>`;
                setTimeout(() => statusDiv.innerHTML = '', 5000);
            }
        }

        function showGithubStatus(type, message) {
            const statusDiv = document.getElementById('githubStatus');
            statusDiv.innerHTML = `<div class="status ${type} show">${message}</div>`;
            if (type === 'success') {
                setTimeout(() => statusDiv.innerHTML = '', 2000);
            }
        }

        function getCurrentTab() {
            const activeTab = document.querySelector('.tab-btn.active');
            return activeTab ? activeTab.textContent.toLowerCase().split(' ')[1] : 'hero';
        }

        // Iniciar
        loadData();
    </script>
</body>
</html>
