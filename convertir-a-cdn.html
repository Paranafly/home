<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertir URLs a CDN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            min-height: 150px;
            resize: vertical;
            font-size: 12px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .result {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        .copy-btn {
            background: #4CAF50;
            padding: 8px 16px;
            font-size: 12px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #2196F3;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Convertir URLs de Imágenes</h1>
        <p class="subtitle">Herramienta para cambiar URLs de imágenes a CDN</p>

        <div class="info">
            💡 <strong>CDN recomendados:</strong> Cloudinary, Imgur, Bunny.net, jsDelivr (gratuitos)
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('cloudinary')">Cloudinary</button>
            <button class="tab-btn" onclick="switchTab('custom')">URL Personalizada</button>
            <button class="tab-btn" onclick="switchTab('batch')">Procesador en Lote</button>
        </div>

        <!-- CLOUDINARY -->
        <div id="cloudinary" class="tab-content active">
            <div class="section">
                <label>👤 Usuario de Cloudinary</label>
                <input type="text" id="cloudinaryUser" placeholder="tu-usuario-cloudinary">
            </div>

            <div class="section">
                <label>📄 Pega tu HTML aquí</label>
                <textarea id="htmlCloudinary" placeholder="<!DOCTYPE html>..."></textarea>
            </div>

            <button onclick="convertToCloudinary()">Convertir a Cloudinary</button>

            <div id="resultCloudinary"></div>
        </div>

        <!-- URL PERSONALIZADA -->
        <div id="custom" class="tab-content">
            <div class="section">
                <label>🔗 URL base (ej: https://tu-cdn.com/images/)</label>
                <input type="text" id="customURL" placeholder="https://tu-cdn.com/images/">
            </div>

            <div class="section">
                <label>📄 Pega tu HTML aquí</label>
                <textarea id="htmlCustom" placeholder="<!DOCTYPE html>..."></textarea>
            </div>

            <button onclick="convertToCustom()">Convertir URLs</button>

            <div id="resultCustom"></div>
        </div>

        <!-- PROCESADOR EN LOTE -->
        <div id="batch" class="tab-content">
            <div class="info">
                📋 Procesa múltiples URLs a la vez. Una por línea.
            </div>

            <div class="section">
                <label>URLs actuales (una por línea)</label>
                <textarea id="batchInput" placeholder="./img/img_01.jpg&#10;./img/img_02.jpg&#10;./img/img_03.jpg"></textarea>
            </div>

            <div class="section">
                <label>🔗 URL base de reemplazo</label>
                <input type="text" id="batchURL" placeholder="https://cdn.ejemplo.com/">
            </div>

            <button onclick="processBatch()">Procesar</button>

            <div id="resultBatch"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // Ocultar todos los tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Mostrar tab seleccionado
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function convertToCloudinary() {
            const user = document.getElementById('cloudinaryUser').value.trim();
            const html = document.getElementById('htmlCloudinary').value;

            if (!user) {
                alert('Por favor ingresa tu usuario de Cloudinary');
                return;
            }

            if (!html) {
                alert('Por favor pega tu HTML');
                return;
            }

            // Reemplazar rutas locales con Cloudinary
            let converted = html.replace(
                /src="\.\/img\/(img_\d{2}\.jpg)"/g,
                `src="https://res.cloudinary.com/${user}/image/upload/$1"`
            );

            showResult('resultCloudinary', converted);
        }

        function convertToCustom() {
            const baseURL = document.getElementById('customURL').value.trim();
            const html = document.getElementById('htmlCustom').value;

            if (!baseURL) {
                alert('Por favor ingresa la URL base');
                return;
            }

            if (!html) {
                alert('Por favor pega tu HTML');
                return;
            }

            // Asegurar que la URL termina con /
            const url = baseURL.endsWith('/') ? baseURL : baseURL + '/';

            // Reemplazar rutas locales
            let converted = html.replace(
                /src="\.\/img\/(img_\d{2}\.jpg)"/g,
                `src="${url}$1"`
            );

            showResult('resultCustom', converted);
        }

        function processBatch() {
            const input = document.getElementById('batchInput').value.trim();
            const baseURL = document.getElementById('batchURL').value.trim();

            if (!input || !baseURL) {
                alert('Por favor completa todos los campos');
                return;
            }

            const urls = input.split('\n').map(u => u.trim()).filter(u => u);
            const url = baseURL.endsWith('/') ? baseURL : baseURL + '/';

            let result = urls.map(oldUrl => {
                const filename = oldUrl.split('/').pop();
                return url + filename;
            }).join('\n');

            document.getElementById('resultBatch').innerHTML = `
                <div class="result">
                    <strong>URLs Convertidas:</strong>
                    <textarea readonly style="margin-top:10px;">${result}</textarea>
                    <button class="copy-btn" onclick="copyToClipboard(this.previousElementSibling)">Copiar</button>
                </div>
            `;
        }

        function showResult(elementId, text) {
            document.getElementById(elementId).innerHTML = `
                <div class="result">
                    <strong>HTML Convertido:</strong>
                    <textarea readonly style="margin-top:10px; max-height:300px;">${escapeHtml(text)}</textarea>
                    <button class="copy-btn" onclick="copyToClipboard(this.previousElementSibling)">Copiar Todo</button>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(element) {
            element.select();
            document.execCommand('copy');
            
            const btn = element.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = '✓ Copiado!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
    </script>
</body>
</html>
